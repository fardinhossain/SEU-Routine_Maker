<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#091326" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="Build a clean weekly routine from Southeast University UMS offered sections."
    />
    <title>SEU Routine Maker</title>
    <style>
      html, body, #root { min-height: 100%; margin: 0; background: #091326; }
      #boot-message {
        box-sizing: border-box;
        min-height: 100vh;
        display: grid;
        place-content: center;
        padding: 24px;
        color: #a9b8cf;
        font: 500 15px/1.7 "Segoe UI", sans-serif;
        text-align: center;
      }
      #boot-message strong { color: #6ff7f0; font-size: 18px; }
      #boot-message code { color: #e5edf8; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-message">
        <div>
          <strong>Starting SEU Routine Maker…</strong><br />
          If this message remains, run <code>npm run dev</code> and open the local URL shown in the terminal.
        </div>
      </div>
    </div>
    <noscript>This application requires JavaScript.</noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
