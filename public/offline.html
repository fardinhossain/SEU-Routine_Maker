<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – SEU Routine Maker</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #E1DCC9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .orb {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #6B3F18, #1F150C 70%);
      box-shadow: 0 0 60px 20px rgba(107,63,24,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      animation: pulse 3s ease-in-out infinite;
    }

    .orb svg {
      width: 64px;
      height: 64px;
      color: #E1DCC9;
      opacity: 0.85;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 60px 20px rgba(107,63,24,0.25); }
      50% { transform: scale(1.04); box-shadow: 0 0 80px 30px rgba(107,63,24,0.35); }
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: #E1DCC9;
    }

    p {
      font-size: 1rem;
      color: #9B8A72;
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1F150C;
      border: 1px solid rgba(65,45,21,0.6);
      border-radius: 9999px;
      padding: 0.45rem 1.1rem;
      font-size: 0.82rem;
      color: #9B8A72;
      margin-bottom: 2.5rem;
    }

    .badge span {
      width: 7px;
      height: 7px;
      background: #c07a30;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .btn {
      background: linear-gradient(135deg, #6B3F18, #3D2510);
      border: 1px solid rgba(65,45,21,0.7);
      color: #E1DCC9;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .hint {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: rgba(155,138,114,0.5);
    }
  </style>
</head>
<body>
  <div class="orb">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
      <path d="M12 7v5l4 2"/>
    </svg>
  </div>

  <div class="badge">
    <span></span> No internet connection
  </div>

  <h1>You're offline</h1>

  <p>
    Don't worry — your routine is safely saved on this device.
    Connect to the internet and refresh to get back online.
  </p>

  <button class="btn" onclick="window.location.reload()">Try again</button>

  <p class="hint">Your routine data is stored locally and never lost.</p>
</body>
</html>
